<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>API 测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .box { margin: 15px 0; padding: 15px; border-radius: 8px; }
        .loading { background: #e3f2fd; }
        .success { background: #e8f5e9; border: 1px solid #4caf50; }
        .error { background: #ffebee; border: 1px solid #f44336; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
        input { padding: 10px; font-size: 16px; width: 300px; margin-right: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>搜索 API 测试页面</h1>
    
    <div id="auto-test" class="box loading">
        <h3>自动测试（页面加载时执行）</h3>
        <p>正在测试搜索 "access"...</p>
    </div>

    <div id="manual-test" class="box" style="background: #f5f5f5;">
        <h3>手动测试</h3>
        <div>
            <input type="text" id="keyword" value="access" placeholder="输入单词">
            <button onclick="manualSearch()">搜索</button>
        </div>
        <div id="manual-result"></div>
    </div>

    <script>
        // 自动测试
        async function autoTest() {
            const box = document.getElementById('auto-test');
            try {
                const response = await fetch('/api/words/search?q=access&type=english');
                const data = await response.json();
                
                box.className = 'box success';
                box.innerHTML = `
                    <h3>自动测试 - 成功</h3>
                    <p>找到 ${data.total} 个结果</p>
                    <p>results 数组长度: ${data.results?.length || 0}</p>
                    <p>第一个单词: ${data.results?.[0]?.word || '无'}</p>
                    <pre>${JSON.stringify(data.results?.[0], null, 2)}</pre>
                `;
            } catch (err) {
                box.className = 'box error';
                box.innerHTML = `
                    <h3>自动测试 - 失败</h3>
                    <p>错误: ${err.message}</p>
                `;
            }
        }

        // 手动测试
        async function manualSearch() {
            const keyword = document.getElementById('keyword').value;
            const resultDiv = document.getElementById('manual-result');
            resultDiv.innerHTML = '<p>搜索中...</p>';
            
            try {
                const response = await fetch(`/api/words/search?q=${encodeURIComponent(keyword)}&type=english`);
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="box success">
                        <h4>搜索 "${keyword}" 成功</h4>
                        <p>找到 ${data.total} 个结果</p>
                        ${data.results?.map(w => `<p>- ${w.word}: ${w.meaning?.substring(0, 50)}</p>`).join('') || '<p>无结果</p>'}
                    </div>
                `;
            } catch (err) {
                resultDiv.innerHTML = `
                    <div class="box error">
                        <h4>搜索失败</h4>
                        <p>${err.message}</p>
                    </div>
                `;
            }
        }

        // 页面加载时执行自动测试
        window.addEventListener('load', autoTest);
    </script>
</body>
</html>
